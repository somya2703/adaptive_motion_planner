name: Motion Planner CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, test, and run pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: adaptive-motion-planner:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Pre-create results dirs owned by the current (non-root) runner user.
      # This prevents PermissionError when the non-root container user (uid 1000)
      # tries to write into a bind-mounted directory owned by root.
      - name: Pre-create results directories
        run: mkdir -p results/plans results/trajectories results/cbf

      - name: Run unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            -e MPLBACKEND=Agg \
            adaptive-motion-planner:ci \
            python -m pytest tests/ -v \
              --junitxml=/tmp/test_report.xml \
              --tb=short
          # Copy XML out of the container via a second run
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            -e MPLBACKEND=Agg \
            adaptive-motion-planner:ci \
            sh -c "cp /tmp/test_report.xml /app/results/test_report.xml 2>/dev/null || true"

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: results/test_report.xml
          check_name: Unit test results

      - name: Run pipeline (quick mode)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            -e MPLBACKEND=Agg \
            adaptive-motion-planner:ci \
            python pipeline.py --quick --trials 5

      - name: Upload pipeline results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results-${{ github.sha }}
          path: results/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## Adaptive Motion Planner - CI results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/RESULTS.md ]; then
            cat results/RESULTS.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run full benchmark (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            -e MPLBACKEND=Agg \
            adaptive-motion-planner:ci \
            python benchmarks/benchmark.py \
              --all --trials 10 \
              --output /app/results

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            results/benchmarks.json
            results/benchmarks.png
          retention-days: 90
