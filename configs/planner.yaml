# All hyperparameters 

planner:
  max_iter: 5000          # RRT* iteration budget
  step_size: 0.30         # max extension step (rad, joint-space L2)
  goal_radius: 0.15       # convergence ball radius (rad)
  k_neighbours: 10        # rewiring neighbourhood size
  goal_bias: 0.10         # fraction of goal directed samples

trajectory:
  smooth_n: 200           # B-spline resampling points
  dt: 0.001               # control timestep (s) = 1 kHz
  v_max_fraction: 0.60    # fraction of velocity limit to use
  a_max_fraction: 0.50    # fraction of accel limit to use

constraints:
  position_margin: 0.05   # inward margin on joint limits (rad)
  velocity_margin: 0.10   # fraction of velocity limit as buffer
  torque_margin: 0.10     # fraction of torque limit as buffer
  self_col_margin: 0.02   # extra self-collision clearance (m)

cbf:
  alpha_obs: 1.5          # class-K gain for obstacle CBFs
  alpha_jnt: 5.0          # class-K gain for joint limit CBFs
  dt: 0.001               # filter timestep (s)

replanner:
  danger_horizon: 5       # waypoints ahead to check
  danger_margin: 0.08     # extra clearance to trigger replan (m)
  replan_timeout: 0.50    # max replan budget (s)
  planner_iter: 2000      # RRT* iters for replanning (faster budget)
